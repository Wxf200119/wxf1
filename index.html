<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>粒子宇宙</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e27;font-family:'PingFang SC',sans-serif;touch-action:none;user-select:none;overflow:hidden;color:#fff}
#cam{position:fixed;z-index:30;border-radius:14px;overflow:hidden;border:1px solid rgba(100,200,255,.2);box-shadow:0 8px 24px rgba(0,0,0,.5)}
@media(orientation:landscape){#cam{top:16px;right:16px;width:140px;height:105px}}
@media(orientation:portrait){#cam{top:16px;right:16px;width:108px;height:144px}}
#sk{position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1)}
#info{position:fixed;z-index:20;font-size:10px;letter-spacing:.1em;background:rgba(100,150,255,.07);border:1px solid rgba(100,200,255,.12);border-radius:10px;padding:10px 12px;backdrop-filter:blur(8px);line-height:1.9;top:16px;left:16px}
#info div{color:rgba(255,255,255,.45)}#info span{color:rgba(100,220,255,.9);font-weight:600}
#hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:20;opacity:0;pointer-events:none;transition:opacity .25s}
#hint.show{opacity:1}
#hi{font-size:52px;margin-bottom:6px}
#ht{font-size:11px;letter-spacing:.15em;color:rgba(120,210,255,.8)}
#ctrl{position:fixed;z-index:50;display:flex;gap:7px;padding:7px;background:rgba(100,150,255,.07);border:1px solid rgba(100,200,255,.12);border-radius:14px;backdrop-filter:blur(8px)}
@media(orientation:landscape){#ctrl{bottom:20px;left:20px}}
@media(orientation:portrait){#ctrl{bottom:16px;left:16px;flex-direction:column}}
.b{border:1.5px solid rgba(100,200,255,.25);background:rgba(100,200,255,.07);color:rgba(100,200,255,.75);border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all .15s;padding:10px 13px;font-size:11px;font-weight:600;min-width:46px;min-height:46px;display:flex;align-items:center;justify-content:center}
.b.on{background:rgba(100,200,255,.18);border-color:rgba(100,200,255,.7);color:#fff;box-shadow:0 0 14px rgba(100,200,255,.3)}
.b:active{transform:scale(.91)}
#rp{position:fixed;inset:0;z-index:10;pointer-events:none}
.rp{position:absolute;border-radius:50%;transform:translate(-50%,-50%) scale(0);animation:rp .55s ease-out forwards}
@keyframes rp{to{transform:translate(-50%,-50%) scale(1);opacity:0}}
</style>
</head>
<body>
<video id="v" autoplay playsinline muted style="display:none"></video>
<div id="cam"><canvas id="sk"></canvas></div>
<div id="info">
  <div>粒子 <span id="pc">—</span></div>
  <div>FPS <span id="fps">—</span></div>
  <div id="mode">等待…</div>
</div>
<div id="hint"><div id="hi">👆</div><div id="ht">TRACKING</div></div>
<div id="rp"></div>
<div id="ctrl">
  <button class="b on" onclick="setShape('galaxy')">🌌</button>
  <button class="b" onclick="setShape('sphere')">🔮</button>
  <button class="b" onclick="setShape('dna')">🧬</button>
  <button class="b" onclick="setShape('wave')">🌊</button>
  <button class="b" onclick="explode()">💥</button>
  <button class="b" onclick="resetView()">⟳</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const IS_LOW = Math.min(devicePixelRatio,2)<1.5||(navigator.hardwareConcurrency||4)<4;
const CNT = IS_LOW?2500:4000;

// ── THREE ──
const scene=new THREE.Scene();
const cam3=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,3000);
cam3.position.z=200;
const renderer=new THREE.WebGLRenderer({antialias:!IS_LOW,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
renderer.setSize(innerWidth,innerHeight);
renderer.setClearColor(0x0a0e27,1);
document.body.appendChild(renderer.domElement);
renderer.domElement.style.cssText='position:fixed;inset:0;z-index:1';

// ── PARTICLES ──
let shape='galaxy',geo,mat,pts,pos,vel,base,col,orig,time=0,fc=0,fpsT=0,physF=0;

const hsl=(h,s,l)=>{h=(h%360)/360;const q=l<.5?l*(1+s):l+s-l*s,p=2*l-q,f=(p,q,t)=>{t=(t+1)%1;return t<1/6?p+(q-p)*6*t:t<.5?q:t<2/3?p+(q-p)*(2/3-t)*6:p};return[f(p,q,h+1/3),f(p,q,h),f(p,q,h-1/3)]};

const POS={
  galaxy:(i,n)=>{const t=Math.random(),r=t*80,a=(i%3)*(Math.PI*2/3)+t*Math.PI*4;return[Math.cos(a)*r+(Math.random()-.5)*10,(Math.random()-.5)*10,Math.sin(a)*r+(Math.random()-.5)*10]},
  sphere:()=>{const phi=Math.acos(2*Math.random()-1),th=Math.random()*Math.PI*2,r=55+(Math.random()-.5)*14;return[r*Math.sin(phi)*Math.cos(th),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(th)]},
  dna:(i,n)=>{const t=(i/n)*Math.PI*14-Math.PI*7,o=i%2?Math.PI:0;return[Math.cos(t+o)*20+(Math.random()-.5)*2,t*6,Math.sin(t+o)*20+(Math.random()-.5)*2]},
  wave:(i,n)=>{const c=Math.ceil(Math.sqrt(n*1.6)),x=i%c,y=Math.floor(i/c);return[(x/c-.5)*160,0,(y/Math.ceil(n/c)-.5)*160]}
};
const COL={
  galaxy:(i,n)=>hsl(210+(i/n)*70,.85,.55),
  sphere:(i,n)=>hsl((i/n)*360,.9,.6),
  dna:(i,n)=>i%2?hsl(20,.95,.6):hsl(200,.9,.6),
  wave:(i,n)=>hsl(180+(i/n)*100,.85,.55)
};

const build=n=>{
  if(pts)scene.remove(pts);
  geo=new THREE.BufferGeometry();
  pos=new Float32Array(n*3);vel=new Float32Array(n*3);base=new Float32Array(n*3);col=new Float32Array(n*3);orig=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const[x,y,z]=POS[shape](i,n);pos[i*3]=base[i*3]=x;pos[i*3+1]=base[i*3+1]=y;pos[i*3+2]=base[i*3+2]=z;
    const[r,g,b]=COL[shape](i,n);col[i*3]=orig[i*3]=r;col[i*3+1]=orig[i*3+1]=g;col[i*3+2]=orig[i*3+2]=b;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  mat=new THREE.PointsMaterial({size:1.4,vertexColors:true,transparent:true,opacity:.88,blending:THREE.AdditiveBlending,depthWrite:false});
  pts=new THREE.Points(geo,mat);scene.add(pts);
  document.getElementById('pc').textContent=n.toLocaleString();
};

// 背景星
const sg=new THREE.BufferGeometry(),sp=new Float32Array(1500*3);
for(let i=0;i<1500;i++){const r=450+Math.random()*200,phi=Math.acos(2*Math.random()-1),th=Math.random()*Math.PI*2;sp[i*3]=r*Math.sin(phi)*Math.cos(th);sp[i*3+1]=r*Math.cos(phi);sp[i*3+2]=r*Math.sin(phi)*Math.sin(th)}
sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({size:.5,color:0x6496ff,transparent:true,opacity:.15})));

// ── STATE ──
let hands=[],zoom=1,tZoom=1,exploding=0,explodeVel;
let lastPos={x:.5,y:.5},lastLm=null,sDx=0,sDy=0,skelDirty=false;
const wX=new THREE.Vector3(1,0,0),wY=new THREE.Vector3(0,1,0);
const curQ=new THREE.Quaternion(),tgtQ=new THREE.Quaternion(),tmpQ=new THREE.Quaternion();

// ── SKELETON ──
const sk=document.getElementById('sk'),skx=sk.getContext('2d');
const CONN=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
const drawSk=lms=>{
  const w=sk.width,h=sk.height;skx.clearRect(0,0,w,h);
  for(const lm of lms){
    skx.strokeStyle='rgba(100,200,255,.55)';skx.lineWidth=1;
    for(const[a,b]of CONN){skx.beginPath();skx.moveTo(lm[a].x*w,lm[a].y*h);skx.lineTo(lm[b].x*w,lm[b].y*h);skx.stroke()}
    for(let i=0;i<21;i++){skx.beginPath();skx.arc(lm[i].x*w,lm[i].y*h,i?1:1.8,0,Math.PI*2);skx.fillStyle=i?'rgba(100,200,255,.55)':'rgba(100,220,255,.9)';skx.fill()}
  }
};

const getSpread=lm=>{const t=[4,8,12,16,20];let d=0;for(let i=0;i<t.length;i++)for(let j=i+1;j<t.length;j++){const dx=lm[t[i]].x-lm[t[j]].x,dy=lm[t[i]].y-lm[t[j]].y;d+=Math.sqrt(dx*dx+dy*dy)}return d/10};

const hint=(i,t)=>{document.getElementById('hi').textContent=i;document.getElementById('ht').textContent=t;const e=document.getElementById('hint');e.classList.add('show');clearTimeout(window.hT);window.hT=setTimeout(()=>e.classList.remove('show'),900)};

// ── EXPLODE ──
const explode=()=>{
  exploding=performance.now();
  explodeVel=new Float32Array(CNT*3);
  for(let i=0;i<CNT;i++){const phi=Math.acos(2*Math.random()-1),th=Math.random()*Math.PI*2;explodeVel[i*3]=Math.sin(phi)*Math.cos(th)*1.5;explodeVel[i*3+1]=Math.cos(phi)*1.5;explodeVel[i*3+2]=Math.sin(phi)*Math.sin(th)*1.5}
  for(let r=0;r<3;r++){const e=document.createElement('div');e.className='rp';const s=55*(r+1);e.style.cssText=`left:50%;top:50%;width:${s}px;height:${s}px;border:1px solid rgba(100,200,255,${.55-r*.15});animation-delay:${r*.1}s`;document.getElementById('rp').appendChild(e);setTimeout(()=>e.remove(),900)}
};

// ── HAND CALLBACK ──
const onHands=r=>{
  const lms=r.multiHandLandmarks||[];
  hands=[];lms.forEach(lm=>{const p=lm[9];hands.push({x:p.x,y:p.y,lm})});
  skelDirty=true;
  const mEl=document.getElementById('mode');
  if(hands.length===1){
    const h=hands[0],dx=h.x-lastPos.x,dy=h.y-lastPos.y;
    const moving=Math.abs(dx)>.003||Math.abs(dy)>.003;
    if(moving){
      sDx=sDx*.5+dx*.5;sDy=sDy*.5+dy*.5;
      tmpQ.setFromAxisAngle(wY,sDx*Math.PI*2);tgtQ.premultiply(tmpQ);
      tmpQ.setFromAxisAngle(wX,sDy*Math.PI*2);tgtQ.premultiply(tmpQ);
      mEl.textContent='XY 旋转';
    }else if(lastLm){
      sDx=0;sDy=0;
      const sp=getSpread(h.lm),psp=getSpread(lastLm),d=sp-psp;
      if(Math.abs(d)>.001){
        tZoom=Math.max(.3,Math.min(5,zoom+d*40));
        mEl.textContent=`${sp>.18?'张开':sp<.08?'握拳':'—'} ${Math.round(tZoom*10)/10}x`;
        if(sp>.18)hint('🖐','放大');else if(sp<.08)hint('✊','缩小');
      }
    }
    lastPos={x:h.x,y:h.y};lastLm=h.lm;
  }else{
    mEl.textContent='无检测';lastLm=null;
    if(!lms.length)skx.clearRect(0,0,sk.width,sk.height);
  }
};

// ── CAMERA ──
(async()=>{
  try{
    const video=document.getElementById('v');
    video.srcObject=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:320},height:{ideal:240}},audio:false});
    await video.play();
    const cam=document.getElementById('cam');sk.width=cam.offsetWidth;sk.height=cam.offsetHeight;
    const hp=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`});
    hp.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:.65,minTrackingConfidence:.55});
    hp.onResults(onHands);
    let fr=0;
    new Camera(video,{onFrame:async()=>{if(fr++%2===0)await hp.send({image:video})},width:320,height:240}).start();
    document.getElementById('mode').textContent='检测中…';
  }catch{document.getElementById('mode').textContent='摄像头失败'}
})();

// ── PHYSICS ──
const update=()=>{
  if(physF++%2===0){
    if(shape==='wave')for(let i=0;i<CNT;i++)base[i*3+1]=Math.sin(base[i*3]*.055+time*2)*Math.cos(base[i*3+2]*.048+time*1.4)*20;
    else if(shape==='galaxy')for(let i=0;i<CNT;i++){const bx=base[i*3],bz=base[i*3+2],r=Math.sqrt(bx*bx+bz*bz),sw=.003/(r*.02+.5),c=Math.cos(sw),s=Math.sin(sw);base[i*3]=bx*c-bz*s;base[i*3+2]=bx*s+bz*c}
  }
  if(exploding&&performance.now()-exploding<2000){
    const t=(performance.now()-exploding)/1000,ease=t<.3?1-Math.pow(1-t/.3,3):Math.exp(-t*1.6);
    for(let i=0;i<CNT;i++){vel[i*3]+=explodeVel[i*3]*ease*140*.016;vel[i*3+1]+=explodeVel[i*3+1]*ease*140*.016;vel[i*3+2]+=explodeVel[i*3+2]*ease*140*.016;const h=ease*1.2;col[i*3]=orig[i*3]+h*(1-orig[i*3]);col[i*3+1]=orig[i*3+1]+h*.3;col[i*3+2]=orig[i*3+2]*(1-h*.7)}
  }
  const hh=hands.length>0,ret=hh?.08:.022,dmp=hh?.92:.965,rc=!exploding||performance.now()-exploding>2000;
  for(let i=0;i<CNT;i++){const i3=i*3;vel[i3]+=(base[i3]-pos[i3])*ret;vel[i3+1]+=(base[i3+1]-pos[i3+1])*ret;vel[i3+2]+=(base[i3+2]-pos[i3+2])*ret;vel[i3]*=dmp;vel[i3+1]*=dmp;vel[i3+2]*=dmp;pos[i3]+=vel[i3];pos[i3+1]+=vel[i3+1];pos[i3+2]+=vel[i3+2];if(rc){col[i3]+=(orig[i3]-col[i3])*.06;col[i3+1]+=(orig[i3+1]-col[i3+1])*.06;col[i3+2]+=(orig[i3+2]-col[i3+2])*.06}}
};

// ── RENDER ──
const animate=()=>{
  requestAnimationFrame(animate);time+=.016;
  curQ.slerp(tgtQ,.1);pts.quaternion.copy(curQ);
  zoom+=(tZoom-zoom)*.12;cam3.position.z=200/zoom;
  update();
  if(skelDirty){if(hands.length)drawSk(hands.map(h=>h.lm));skelDirty=false}
  geo.attributes.position.needsUpdate=true;geo.attributes.color.needsUpdate=true;
  renderer.render(scene,cam3);
  fc++;const now=performance.now();if(now-fpsT>800){document.getElementById('fps').textContent=Math.round(fc*1000/(now-fpsT));fc=0;fpsT=now}
};

window.setShape=s=>{shape=s;document.querySelectorAll('.b').forEach(b=>b.classList.toggle('on',b.textContent.includes({galaxy:'🌌',sphere:'🔮',dna:'🧬',wave:'🌊'}[s])));if(vel)vel.fill(0);build(CNT);curQ.identity();tgtQ.identity()};
window.resetView=()=>{tgtQ.identity();zoom=1;tZoom=1;hint('⟳','已重置')};
window.addEventListener('resize',()=>{cam3.aspect=innerWidth/innerHeight;cam3.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});

build(CNT);animate();hint('👆','等待检测…');
</script>
</body>
</html>
